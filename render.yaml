databases:
  - name: bitsconnect-db
    plan: free
    databaseName: bitsconnect
    user: bits

services:
  - type: web
    name: bitsconnect-server
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: ALLOWED_DOMAIN
        value: pilani.bits-pilani.ac.in
      - key: BYPASS_DOMAIN_CHECK
        value: "true"
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CALLBACK_URL
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: bitsconnect-db
          property: connectionString

  - type: web
    name: bitsconnect-client
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
